version: "3.9"

services:
  qdrant:
    image: qdrant/qdrant:v1.9.4
    container_name: asa_qdrant
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage
    environment:
      QDRANT__SERVICE__GRPC_PORT: "6334"
      QDRANT__LOG_LEVEL: "INFO"
    restart: unless-stopped

  redis:
    image: redis:7.2-alpine
    container_name: asa_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: >
      redis-server
      --save 60 1
      --loglevel warning
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    restart: unless-stopped

  asa:
    build:
      context: .
      dockerfile: Dockerfile
      target: runtime
    container_name: asa_api
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      QDRANT_HOST: qdrant
      QDRANT_PORT: "6333"
      REDIS_HOST: redis
      REDIS_PORT: "6379"
      API_HOST: "0.0.0.0"
      API_PORT: "8000"
    volumes:
      - ./data:/app/data:ro
      - ./static:/app/static:ro
      - ./logs:/app/logs
    depends_on:
      qdrant:
        condition: service_started
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/v1/health"]
      interval: 30s
      timeout: 10s
      start_period: 90s
      retries: 3
    restart: unless-stopped

volumes:
  qdrant_data:
  redis_data:
